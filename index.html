<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0a0a0a;color:#e8e4dc;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
button{cursor:pointer;border:none;outline:none;background:none}
a{text-decoration:none;-webkit-tap-highlight-color:transparent}
#hdr{display:flex;align-items:center;gap:10px;padding:12px 14px 10px;background:#0a0a0a;position:sticky;top:0;z-index:200;border-bottom:1px solid #1a1a1a}
.app-title{font-size:26px;font-weight:800;letter-spacing:-.5px;color:#fff;line-height:1}

.hi-tx{font-size:13px;line-height:1.75;color:#b0aca4}
.ev{margin-bottom:8px;border-radius:10px;overflow:hidden;border:1px solid #1c1c1c;background:#111}
.ev.hot{border-color:rgba(192,57,43,.4);background:#120a08}
.ev-hd{display:flex;align-items:center;gap:10px;padding:12px;cursor:pointer;user-select:none;-webkit-user-select:none}
.ev-ic{font-size:22px;min-width:28px}
.ev-mt{flex:1;min-width:0}
.ev-nm{font-size:13px;font-weight:700;display:block;margin-bottom:2px;color:#e8e4dc}

.ev-bd{display:none;padding:0 12px 12px 52px;border-top:1px solid #181818}
.ev-bd.on{display:block}
.ev-fl{font-size:12px;line-height:1.85;color:#888;margin-top:10px}
.ev-tg{display:inline-block;margin-top:6px;background:#1a1a1a;border-radius:3px;padding:2px 6px;font-size:9px;color:#444}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:#fff;color:#111;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 4px 24px rgba(0,0,0,.6);display:none;max-width:90vw;text-align:center}
#toast.on{display:block;animation:tup .25s ease}
@keyframes tup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
#sbar{font-size:10px;color:#2a2a2a;padding:3px 14px;min-height:18px}
.empty{color:#444;font-size:13px;padding:24px 0;text-align:center;line-height:1.9}
.stale-note{font-size:10px;color:#3a3a2a;font-style:italic;padding:4px 0 8px}
</style>

<script>
/* ═══════════════════════════════════════════════════════
   Ne Olmuş — v7
   Proxy zinciri (sırayla denenir, biri çalışır):
     1. allorigins.win/raw  → doğrudan XML
     2. corsproxy.io        → doğrudan XML
     3. api.codetabs.com    → doğrudan XML
   Önbellek: localStorage (sayfa kapansa bile kalır)
   Çeviri: MyMemory (ücretsiz, anahtar yok)
═══════════════════════════════════════════════════════ */

/* ── KAYNAKLAR ─────────────────────────────────────── */
var TR_FEEDS = [
  {n:'Hürriyet',  u:'https://www.hurriyet.com.tr/rss/anasayfa'},
  {n:'NTV',       u:'https://www.ntv.com.tr/son-dakika.rss'},
  {n:'Sözcü',     u:'https://www.sozcu.com.tr/rss.xml'},
  {n:'Habertürk', u:'https://www.haberturk.com/rss'}
];
var WO_FEEDS = [
  {n:'BBC World',         u:'https://feeds.bbci.co.uk/news/world/rss.xml'},
  {n:'NY Times',          u:'https://rss.nytimes.com/services/xml/rss/nyt/World.xml'},
  {n:'Sky News',          u:'https://feeds.skynews.com/feeds/rss/world.xml'},
  {n:'Al Jazeera',        u:'https://www.aljazeera.com/xml/rss/all.xml'},
  {n:'CNN International', u:'https://rss.cnn.com/rss/edition_world.rss'}
];

/* ── PROXY ZİNCİRİ ─────────────────────────────────── */
var PROXIES = [
  function(u){ return 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u); },
  function(u){ return 'https://corsproxy.io/?' + encodeURIComponent(u); },
  function(u){ return 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u); }
];

/* ── iOS UYUMLU TIMEOUT ────────────────────────────── */
function tfetch(url, ms) {
  var ctrl = new AbortController();
  var tid = setTimeout(function(){ ctrl.abort(); }, ms || 10000);
  return fetch(url, {signal: ctrl.signal})
    .then(function(r){ clearTimeout(tid); return r; })
    .catch(function(e){ clearTimeout(tid); throw e; });
}

/* ── ÖNBELLEK (localStorage — kapansa bile kalır) ───── */
var LS = {
  get: function(k, maxMs) {
    try {
      var raw = localStorage.getItem('no7_' + k);
      if (!raw) return null;
      var obj = JSON.parse(raw);
      if (Date.now() - obj.t < (maxMs || 3600000)) return obj.v;
      return null;
    } catch(e) { return null; }
  },
  getOld: function(k) {            /* Süresi dolmuş olsa da ver */
    try {
      var raw = localStorage.getItem('no7_' + k);
      if (!raw) return null;
      var obj = JSON.parse(raw);
      return {v: obj.v || null, t: obj.t || 0};
    } catch(e) { return null; }
  },
  set: function(k, v) {
    try { localStorage.setItem('no7_' + k, JSON.stringify({v:v, t:Date.now()})); } catch(e) {}
  }
};

/* ── ARAÇLAR ─────────────────────────────────────────  */
function esc(s) {
  var d = document.createElement('div');
  d.textContent = String(s || '');
  return d.innerHTML;
}
function clean(h) {
  if (!h) return '';
  /* CDATA */
  h = h.replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, '$1');
  /* HTML tags */
  h = h.replace(/<[^>]+>/g, ' ');
  /* entities */
  var t = document.createElement('textarea');
  t.innerHTML = h;
  return t.value.replace(/\s+/g, ' ').trim();
}
function ago(d) {
  try {
    var dt = new Date(d);
    if (isNaN(dt)) return '';
    var m = Math.floor((Date.now() - dt) / 60000);
    if (m < 1)    return 'az önce';
    if (m < 60)   return m + ' dk önce';
    if (m < 1440) return Math.floor(m/60) + ' sa önce';
    return dt.toLocaleDateString('tr-TR', {day:'numeric',month:'short'});
  } catch(e) { return ''; }
}
function fmtDM(d)  { return d.toLocaleDateString('tr-TR',{day:'numeric',month:'long'}); }
function fmtDMY(d) { return d.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'}); }
function sbar(m)   { document.getElementById('sbar').textContent = m || ''; }

/* ── RSS ÇEKME (proxy zinciri ile) ─────────────────── */
function fetchOneFeed(feedUrl, proxyIdx) {
  proxyIdx = proxyIdx || 0;
  if (proxyIdx >= PROXIES.length) return Promise.resolve([]);
  var url = PROXIES[proxyIdx](feedUrl);
  return tfetch(url, 10000)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(txt) {
      /* allorigins /raw zaman zaman JSON wrapper döndürebilir */
      if (txt && txt.trim().charAt(0) === '{') {
        try { txt = JSON.parse(txt).contents || txt; } catch(e) {}
      }
      if (!txt || txt.length < 100) throw new Error('empty');
      if (!txt.includes('<item') && !txt.includes('<entry')) throw new Error('no items');
      return txt;
    })
    .catch(function() {
      /* bu proxy olmadı → bir sonrakini dene */
      return fetchOneFeed(feedUrl, proxyIdx + 1);
    });
}

function parseXML(xml, name) {
  try {
    var doc = new DOMParser().parseFromString(xml, 'text/xml');
    if (doc.querySelector('parsererror')) {
      doc = new DOMParser().parseFromString(xml, 'text/html');
    }
    var items = Array.prototype.slice.call(doc.querySelectorAll('item, entry'));
    var out = [];
    for (var i = 0; i < Math.min(items.length, 4); i++) {
      var item = items[i];
      var title = clean(item.querySelector('title') ? item.querySelector('title').textContent : '');
      if (!title || title.length < 4) continue;
      var linkEl = item.querySelector('link');
      var url = '';
      if (linkEl) url = linkEl.getAttribute('href') || clean(linkEl.textContent) || '';
      if (!url || url.indexOf('http') !== 0) {
        var g = item.querySelector('guid');
        if (g) { var gv = clean(g.textContent); if (gv.indexOf('http') === 0) url = gv; }
      }
      var descEl = item.querySelector('description') || item.querySelector('summary') || item.querySelector('content');
      var summary = descEl ? clean(descEl.textContent).slice(0, 200) : '';
      var dateEl = item.querySelector('pubDate') || item.querySelector('published') || item.querySelector('updated');
      var pub = dateEl ? new Date(clean(dateEl.textContent)) : new Date();
      if (isNaN(pub.getTime())) pub = new Date();
      out.push({title:title, summary:summary, url:url, source:name, pub:pub.toISOString()});
    }
    return out;
  } catch(e) { return []; }
}

function loadFeed(src) {
  return fetchOneFeed(src.u).then(function(xml) {
    return xml ? parseXML(xml, src.n) : [];
  });
}

/* ── ÇEVİRİ (MyMemory) ─────────────────────────────── */
function translate(text) {
  return new Promise(function(resolve) {
    if (!text || text.length < 4) { resolve(text); return; }
    var clean_t = text.slice(0, 400);
    var ck = 'tx7_' + clean_t.slice(0, 20).replace(/[^a-z0-9]/gi, '');
    var hit = LS.get(ck, 86400000);
    if (hit) { resolve(hit); return; }
    var url = 'https://api.mymemory.translated.net/get?q=' +
              encodeURIComponent(clean_t) + '&langpair=en|tr';
    tfetch(url, 8000)
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.responseStatus === 200 && d.responseData && d.responseData.translatedText) {
          LS.set(ck, d.responseData.translatedText);
          resolve(d.responseData.translatedText);
        } else { resolve(text); }
      })
      .catch(function() { resolve(text); });
  });
}

/* ── TÜRK HABERLERİ ─────────────────────────────────── */
function loadTR() {
  return new Promise(function(resolve) {
    var fresh = LS.get('tr', 3600000);
    if (fresh) { resolve({data:fresh, stale:false}); return; }
    spin(true, 'tr'); sbar('Türkiye haberleri yükleniyor…');
    Promise.all(TR_FEEDS.map(function(f) { return loadFeed(f); }))
      .then(function(results) {
        var all = [];
        results.forEach(function(r) { all = all.concat(r); });
        all.sort(function(a,b){ return new Date(b.pub) - new Date(a.pub); });
        all = all.slice(0, 10);
        spin(false, 'tr');
        if (all.length) {
          LS.set('tr', all);
          resolve({data:all, stale:false});
        } else {
          var old = LS.getOld('tr');
          resolve({data: old ? old.v : [], stale: true, savedAt: old ? old.t : 0});
        }
      });
  });
}

/* ── DÜNYA HABERLERİ ─────────────────────────────────── */
function loadWorld() {
  return new Promise(function(resolve) {
    var fresh = LS.get('wo', 3600000);
    if (fresh) { resolve({data:fresh, stale:false}); return; }
    spin(true, 'wo'); sbar('Dünya haberleri yükleniyor…');
    Promise.all(WO_FEEDS.map(function(f) { return loadFeed(f); }))
      .then(function(results) {
        var all = [];
        results.forEach(function(r) { all = all.concat(r); });
        all.sort(function(a,b){ return new Date(b.pub) - new Date(a.pub); });
        all = all.slice(0, 10);
        /* başlıkları çevir */
        return Promise.all(all.map(function(item) {
          return translate(item.title).then(function(tr) {
            return {title:tr, summary:item.summary, url:item.url, source:item.source, pub:item.pub};
          });
        }));
      })
      .then(function(translated) {
        spin(false, 'wo');
        if (translated.length) {
          LS.set('wo', translated);
          resolve({data:translated, stale:false});
        } else {
          var old = LS.getOld('wo');
          resolve({data: old ? old.v : [], stale: true, savedAt: old ? old.t : 0});
        }
      });
  });
}

/* ── TARİHTE BUGÜN ─────────────────────────────────── */
function loadHist() {
  return new Promise(function(resolve) {
    var today = new Date();
    var m = today.getMonth()+1, d = today.getDate();
    var ck = 'hist7_' + m + '_' + d;
    var c = LS.get(ck, 43200000);
    if (c) { resolve(c); return; }
    tfetch('https://tr.wikipedia.org/api/rest_v1/feed/onthisday/events/' + m + '/' + d, 10000)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.events || !data.events.length) throw new Error('empty');
        var evts = data.events
          .map(function(e) { return {year: parseInt(e.year)||0, event: e.text}; })
          .filter(function(e) { return e.year > 0 && e.event; })
          .sort(function(a,b) { return b.year - a.year; })
          .slice(0, 12);
        LS.set(ck, evts);
        resolve(evts);
      })
      .catch(function() {
        tfetch('https://en.wikipedia.org/api/rest_v1/feed/onthisday/events/' + m + '/' + d, 10000)
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (!data.events || !data.events.length) { resolve([]); return; }
            var picked = data.events
              .map(function(e) { return {year: parseInt(e.year)||0, event: e.text}; })
              .filter(function(e) { return e.year > 0; })
              .sort(function(a,b) { return b.year - a.year; })
              .slice(0, 12);
            Promise.all(picked.map(function(e) {
              return translate(e.event).then(function(tr) { return {year:e.year, event:tr}; });
            })).then(function(evts) { LS.set(ck, evts); resolve(evts); });
          })
          .catch(function() { resolve([]); });
      });
  });
}

function easterD(y){var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,da);}
function nthSun(y,m,n){var d=new Date(y,m-1,1),c=0;while(d.getMonth()===m-1){if(d.getDay()===0&&++c===n)return new Date(d);d.setDate(d.getDate()+1);}return null;}
function getEvts(today,y){
  var ea=easterD(y),md=nthSun(y,5,2);
  var dyn=[
    {id:'paskalya',name:'Paskalya',emoji:'🐣',m:ea.getMonth()+1,d:ea.getDate(),tp:'s',cat:'kutlama',sh:y+' Paskalyası: '+fmtDM(ea),fl:'Hz. İsa\'nın dirilişini kutlayan Hristiyan bayramıdır.'},
    {id:'anneler', name:'Anneler Günü',emoji:'💐',m:md.getMonth()+1,d:md.getDate(),tp:'s',cat:'kutlama',sh:"Mayıs'ın ikinci Pazar'ı: "+fmtDM(md),fl:'Her yıl Mayıs\'ın ikinci Pazar\'ında kutlanır.'}
  ];
  var all=FE.concat(dyn),res=[];
  var tn=new Date(today.getFullYear(),today.getMonth(),today.getDate());
  for(var i=0;i<all.length;i++){
    var ev=all[i],s,e;
    if(ev.tp==='s'){var yr=y,t0=new Date(yr,ev.m-1,ev.d);if(t0<new Date(+tn-15*864e5))yr++;s=e=new Date(yr,ev.m-1,ev.d);}
    else{var sy=y,ey=y;if(ev.sM>ev.eM){if(today.getMonth()+1<=ev.eM)sy--;else ey++;}s=new Date(sy,ev.sM-1,ev.sD);e=new Date(ey,ev.eM-1,ev.eD);}
    var ds=Math.floor((s-tn)/864e5),de=Math.floor((e-tn)/864e5);
    if(ds<=15&&de>=-15){var st='up';if(ev.tp==='p'){if(ds<=0&&de>=0)st='act';else if(de<0)st='old';}else{if(ds===0)st='act';else if(ds<0)st='old';}res.push({ev:ev,sDate:s,eDate:e,ds:ds,de:de,st:st});}
  }
  res.sort(function(a,b){return a.ds-b.ds;});
  return res;
}

/* ══════════ RENDER ══════════ */
function skels(n){
  var h='';n=n||4;
  for(var i=0;i<n;i++){h+='<div class="sk-wrap"><div class="sk" style="height:10px;width:'+(20+i*10)+'%;margin-bottom:8px"></div><div class="sk" style="height:16px;width:96%;margin-bottom:7px"></div><div class="sk" style="height:12px;width:'+(55+i*7)+'%;margin-bottom:6px"></div><div class="sk" style="height:10px;width:25%"></div></div>';}
  return h;
}

function staleNote(t) {
  if (!t) return '';
  var dt = new Date(t);
  return '<p class="stale-note">⚠️ Son kaydedilen haberler gösteriliyor (' + ago(dt) + ').</p>';
}

function renderNews(result, lid, cntId, staleId) {
  var el = document.getElementById(lid);
  var cnt = document.getElementById(cntId);
  var st = document.getElementById(staleId);
  var items = result.data || [];
  if (st) st.innerHTML = result.stale ? staleNote(result.savedAt) : '';
  if (!items.length) {
    el.innerHTML = '<div class="empty">Haber yüklenemedi.<br><span style="font-size:11px;color:#2a2a2a">Yenile\'ye basın veya internet bağlantınızı kontrol edin.</span></div>';
    if(cnt) cnt.style.display='none';
    return;
  }
  if(cnt){cnt.textContent=items.length+' haber';cnt.style.display='inline';}
  var h='';
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var lk=(it.url&&it.url.indexOf('http')===0)?'<a class="nc-lk" href="'+esc(it.url)+'" target="_blank" rel="noopener">🔗 Habere Git</a>':'';
    h+='<div class="nc"><div class="nc-top"><span class="nc-src">'+esc(it.source)+'</span><span class="nc-dt">'+ago(it.pub)+'</span></div><div class="nc-ti" onclick="tSum(this)">'+esc(it.title)+'</div><div class="nc-sm">'+esc(it.summary||'Haberin tamamı için kaynağı ziyaret edin.')+'</div><div class="nc-ac"><button class="btn-oz" onclick="tSum(this.closest(\'.nc\').querySelector(\'.nc-ti\'))">Özet</button>'+lk+'</div></div>';
  }
  el.innerHTML=h;
}

function tSum(ti){
  var nc=ti.closest('.nc'),sm=nc.querySelector('.nc-sm'),btn=nc.querySelector('.btn-oz');
  var o=sm.classList.toggle('on');btn.textContent=o?'Gizle':'Özet';
}

function renderHist(evts){
  var el=document.getElementById('hist-el');
  if(!evts||!evts.length){el.innerHTML='<p class="empty">Tarihsel veri yüklenemedi.</p>';return;}
  var h='';
  for(var i=0;i<evts.length;i++){h+='<div class="hi"><span class="hi-yr">'+evts[i].year+'</span><p class="hi-tx">'+esc(evts[i].event)+'</p></div>';}
  h+='<p style="font-size:10px;color:#2a2a2a;margin-top:10px;font-style:italic">Kaynak: Vikipedi · Yakın tarihten uzağa</p>';
  el.innerHTML=h;
}

function renderFolk(){
  var today=new Date(),y=today.getFullYear(),el=document.getElementById('folk-el');
  var evts=getEvts(today,y);
  if(!evts.length){el.innerHTML='<p class="empty">Bu dönemde yakın tarihli takvim olayı yok.</p>';return;}
  function sc(s){return s==='act'?'#c0392b':s==='up'?'#e67e22':'#333';}
  function sl(ev){if(ev.st==='act')return ev.ev.tp==='p'?(ev.de===0?'Bugün bitiyor':ev.de+' gün daha'):'📌 Bugün!';if(ev.st==='up')return ev.ds+' gün sonra';return Math.abs(ev.de)+' gün önce bitti';}
  var h='';
  for(var i=0;i<evts.length;i++){
    var ev=evts[i],e=ev.ev;
    var dateStr=ev.ev.tp==='p'?fmtDM(ev.sDate)+' – '+fmtDM(ev.eDate):fmtDMY(ev.sDate);
    h+='<div class="ev'+(ev.st==='act'?' hot':'')+'" id="evc-'+e.id+'"><div class="ev-hd" onclick="tEv(\''+e.id+'\')"><span class="ev-ic">'+e.emoji+'</span><div class="ev-mt"><strong class="ev-nm">'+esc(e.name)+'</strong><span class="ev-dt">'+dateStr+'</span><span class="ev-sh">'+esc(e.sh)+'</span></div><span class="ev-bg" style="background:'+sc(ev.st)+'">'+sl(ev)+'</span><span class="ev-cv" id="ecv-'+e.id+'">▼</span></div><div class="ev-bd" id="evb-'+e.id+'"><p class="ev-fl">'+esc(e.fl)+'</p><span class="ev-tg">#'+e.cat+'</span></div></div>';
  }
  el.innerHTML=h;
}
function tEv(id){var b=document.getElementById('evb-'+id),c=document.getElementById('ecv-'+id);var o=b.classList.toggle('on');c.textContent=o?'▲':'▼';}

/* ══════════ BİLDİRİMLER ══════════ */
var notifOn = false;
function toggleNotif(){
  notifOn=!notifOn;
  var btn=document.getElementById('btn-n'),lbl=document.getElementById('n-lbl');
  if(notifOn){
    btn.classList.add('on');lbl.textContent='Aktif ✓';
    toast('🔔 Bildirimler açık! Saat başı ekranda bildirim çıkar.');
    try{
      if(typeof Notification!=='undefined'&&Notification.permission==='default'){
        var p=Notification.requestPermission();
        if(p&&typeof p.then==='function'){p.then(function(){}).catch(function(){});}
      }
    }catch(e){}
  }else{
    btn.classList.remove('on');lbl.textContent='Bildirimler';
    toast('🔕 Bildirimler kapatıldı.');
  }
}
function notify(msg){
  if(!notifOn)return;
  toast('🔔 '+msg);
  try{if(typeof Notification!=='undefined'&&Notification.permission==='granted')new Notification('Ne Olmuş',{body:msg});}catch(e){}
}

/* ══════════ UI ══════════ */
function spin(on,tab){
  var ids=tab?['sp-'+tab]:['sp-tr','sp-wo','sp-al'];
  ids.forEach(function(id){var el=document.getElementById(id);if(el){if(on)el.classList.add('on');else el.classList.remove('on');}});
}
function setUpd(){document.getElementById('upd-t').textContent=new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});}
function tick(){document.getElementById('clk').textContent=new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});}
setInterval(tick,1000);tick();

var aOpen={h:false,f:false};
function togAcc(k){
  aOpen[k]=!aOpen[k];
  var b=document.getElementById('body-'+k);
  if(aOpen[k])b.classList.add('open');else b.classList.remove('open');
  document.getElementById(k==='h'?'h-chv':'f-chv').textContent=aOpen[k]?'▲':'▼';
}

function goTab(id,btn){
  ['tr','wo','al'].forEach(function(t){document.getElementById('p-'+t).style.display=t===id?'block':'none';});
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
}

var _tTmr=null;
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(_tTmr);_tTmr=setTimeout(function(){el.classList.remove('on');},4000);}

/* ══════════ YENİLE ══════════ */
function doRefresh(){
  toast('🔄 Güncelleniyor…');
  ['tr','wo'].forEach(function(k){ try{localStorage.removeItem('no7_'+k);}catch(e){} });
  var today=new Date(); try{localStorage.removeItem('no7_hist7_'+(today.getMonth()+1)+'_'+today.getDate());}catch(e){}
  ['l-tr','l-wo','l-al'].forEach(function(id){document.getElementById(id).innerHTML=skels();});
  ['stale-tr','stale-wo'].forEach(function(id){document.getElementById(id).innerHTML='';});
  document.getElementById('hist-el').innerHTML=skels(3);
  spin(true,'tr');spin(true,'wo');spin(true,'al');
  Promise.all([loadTR(),loadWorld(),loadHist()]).then(function(res){
    var tr=res[0],wo=res[1],hist=res[2];
    renderNews(tr,'l-tr','cnt-tr','stale-tr');
    renderNews(wo,'l-wo','cnt-wo','stale-wo');
    var all=(tr.data||[]).concat(wo.data||[]).sort(function(a,b){return new Date(b.pub)-new Date(a.pub);}).slice(0,15);
    renderNews({data:all,stale:false},'l-al','cnt-al','');
    renderHist(hist);
    spin(false,'tr');spin(false,'wo');spin(false,'al');
    setUpd();
    var trLen=(tr.data||[]).length,woLen=(wo.data||[]).length;
    var msg=trLen+' TR + '+woLen+' Dünya haberi';
    sbar(msg+(tr.stale||wo.stale?' (bazıları önceki saatten)':''));
    if(trLen===0&&woLen===0){toast('⚠️ Haber alınamadı. Bağlantınızı kontrol edin.');}
    else{toast('✅ '+msg);}
    notify(msg+' yüklendi.');
  });
}

/* ══════════ BAŞLANGIÇ ══════════ */
(function init(){
  var today=new Date();
  document.getElementById('h-bdg').textContent=today.toLocaleDateString('tr-TR',{day:'numeric',month:'long'});
  renderFolk();
  /* Tarihte Bugün otomatik açık */
  aOpen.h=true;
  document.getElementById('body-h').classList.add('open');
  document.getElementById('h-chv').textContent='▲';

  ['l-tr','l-wo','l-al'].forEach(function(id){document.getElementById(id).innerHTML=skels();});
  spin(true,'tr');spin(true,'wo');spin(true,'al');
  sbar('Yükleniyor…');

  Promise.all([loadTR(),loadWorld(),loadHist()]).then(function(res){
    var tr=res[0],wo=res[1],hist=res[2];
    renderNews(tr,'l-tr','cnt-tr','stale-tr');
    renderNews(wo,'l-wo','cnt-wo','stale-wo');
    var all=(tr.data||[]).concat(wo.data||[]).sort(function(a,b){return new Date(b.pub)-new Date(a.pub);}).slice(0,15);
    renderNews({data:all,stale:false},'l-al','cnt-al','');
    renderHist(hist);
    spin(false,'tr');spin(false,'wo');spin(false,'al');
    setUpd();
    var trLen=(tr.data||[]).length,woLen=(wo.data||[]).length;
    sbar(trLen+' TR + '+woLen+' Dünya haberi'+(tr.stale||wo.stale?' (önceki saatten)':''));

    /* Saatlik yenileme */
    setInterval(function(){
      ['tr','wo'].forEach(function(k){try{localStorage.removeItem('no7_'+k);}catch(e){}});
      Promise.all([loadTR(),loadWorld()]).then(function(r2){
        var t=r2[0],w=r2[1];
        renderNews(t,'l-tr','cnt-tr','stale-tr');
        renderNews(w,'l-wo','cnt-wo','stale-wo');
        var a=(t.data||[]).concat(w.data||[]).sort(function(a,b){return new Date(b.pub)-new Date(a.pub);}).slice(0,15);
        renderNews({data:a,stale:false},'l-al','cnt-al','');
        setUpd();
        var tl=(t.data||[]).length,wl=(w.data||[]).length;
        sbar(tl+' TR + '+wl+' Dünya haberi');
        notify('Saatlik güncelleme: '+tl+' TR + '+wl+' Dünya haberi.');
      });
    },3600000);
  });
})();
